rules:
  - id: express-input-to-sqlite-query
    mode: taint
    languages:
      - javascript
    severity: ERROR

    message: User-controlled Express request data flows into a SQLite query.

    pattern-sources:
      - pattern: $REQ.body
        exact: true

    pattern-sinks:
      - patterns:
          - pattern: $DB.get($QUERY, ...)
          - pattern-not: $DB.get($QUERY, [$...PARAMS], ...)
