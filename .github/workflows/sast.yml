name: SAST

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  semgrep:
    name: Semgrep Scan
    runs-on: ubuntu-latest

    container:
      image: semgrep/semgrep

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

- name: Run Semgrep
  run: >
    semgrep scan
    --config p/owasp-top-ten
    --exclude-rule javascript.express.security.audit.express-cookie-settings.express-cookie-session-no-expires
    --exclude-rule javascript.express.security.audit.express-cookie-settings.express-cookie-session-no-secure
    --error
    .
